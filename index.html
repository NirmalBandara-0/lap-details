<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laptop Store</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>💻 Laptop Store</h1>

    <input type="text" id="search" placeholder="Search Laptop..."
    onkeyup="searchLaptop()">
</header>

<section class="container">

<div class="card">
<img src="https://picsum.photos/300/200?1">

<h2>Dell Inspiron 15</h2>

<p>Intel Core i5 13th Gen</p>

<p>8GB RAM | 512GB SSD</p>

<p class="price">Rs. 245,000</p>

<button onclick="details('Dell Inspiron 15','Intel Core i5','8GB RAM','512GB SSD','15.6 Full HD','Rs.245,000')">
View Details
</button>

</div>

<div class="card">

<img src="https://picsum.photos/300/200?2">

<h2>HP Pavilion</h2>

<p>Intel Core i7</p>

<p>16GB RAM | 1TB SSD</p>

<p class="price">Rs. 325,000</p>

<button onclick="details('HP Pavilion','Intel Core i7','16GB RAM','1TB SSD','15.6 IPS','Rs.325,000')">
View Details
</button>

</div>

<div class="card">

<img src="https://picsum.photos/300/200?3">

<h2>Lenovo IdeaPad</h2>

<p>Ryzen 5</p>

<p>8GB RAM | 512GB SSD</p>

<p class="price">Rs. 215,000</p>

<button onclick="details('Lenovo IdeaPad','Ryzen 5','8GB RAM','512GB SSD','14 FHD','Rs.215,000')">
View Details
</button>

</div>

</section>

<div id="popup" class="popup">

<div class="popup-content">

<span onclick="closePopup()" class="close">&times;</span>

<h2>Laptop Details</h2>

<p id="info"></p>

</div>

</div>

<footer>

<h2>Contact Us</h2>

<form>

<input type="text" placeholder="Your Name">

<input type="email" placeholder="Email">

<textarea placeholder="Message"></textarea>

<button>Send</button>

</form>

</footer>

<script src="script.js"></script>

</body>
</html>
